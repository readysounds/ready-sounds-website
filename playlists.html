<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlists - Ready Sounds</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 120px; /* Space for fixed player */
        }

        /* Fixed Audio Player */
        .audio-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-top: 1px solid rgba(156, 39, 176, 0.3);
            padding: 16px 24px;
            display: none;
            z-index: 1000;
        }

        .audio-player.active {
            display: block;
        }

        .player-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .player-track-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .player-artwork {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(156, 39, 176, 0.2);
        }

        .player-artwork img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-details h3 {
            font-size: 1em;
            margin-bottom: 4px;
        }

        .player-details p {
            font-size: 0.9em;
            color: #888;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .player-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #9c27b0, #4a148c);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(156, 39, 176, 0.4);
        }

        .player-btn-small {
            width: 36px;
            height: 36px;
            font-size: 16px;
            background: rgba(156, 39, 176, 0.3);
        }

        .player-progress {
            flex: 2;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #9c27b0, #4a148c);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }

        .time {
            font-size: 0.85em;
            color: #888;
            min-width: 45px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 0;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #9c27b0, #4a148c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2em;
            color: #a0a0a0;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #9c27b0;
            text-decoration: none;
            font-size: 1.1em;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #ba68c8;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .playlist-card {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            aspect-ratio: 1;
            background: #1a1a1a;
        }

        .playlist-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(156, 39, 176, 0.3);
        }

        .playlist-card:hover .playlist-image {
            transform: scale(1.05);
        }

        .playlist-card:hover .play-overlay {
            opacity: 1;
        }

        .playlist-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(156, 39, 176, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 2;
        }

        .playlist-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
            padding: 15px;
            color: white;
        }

        .playlist-title {
            font-size: 1em;
            margin-bottom: 3px;
            font-weight: 600;
            line-height: 1.3;
        }

        .playlist-count {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85em;
        }

        .playlist-detail {
            display: none;
            background: rgba(26, 26, 26, 0.8);
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(156, 39, 176, 0.3);
        }

        .playlist-detail.active {
            display: block;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .playlist-header-actions {
            display: flex;
            gap: 10px;
        }

        .playlist-info h2 {
            font-size: 2em;
            color: #9c27b0;
            margin-bottom: 10px;
        }

        .play-playlist-btn {
            background: linear-gradient(135deg, #9c27b0, #4a148c);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .play-playlist-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(156, 39, 176, 0.4);
        }

        .close-playlist {
            background: rgba(156, 39, 176, 0.2);
            border: 1px solid rgba(156, 39, 176, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .close-playlist:hover {
            background: rgba(156, 39, 176, 0.4);
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .track-item {
            background: rgba(26, 26, 26, 0.5);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .track-item:hover {
            background: rgba(156, 39, 176, 0.1);
            border-color: rgba(156, 39, 176, 0.3);
        }

        .track-number {
            font-size: 1.2em;
            color: #9c27b0;
            min-width: 30px;
            text-align: center;
        }

        .track-artwork {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .track-artwork img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-info {
            flex: 1;
        }

        .track-title {
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .track-meta {
            color: #888;
            font-size: 0.9em;
        }

        .track-actions {
            display: flex;
            gap: 10px;
        }

        .track-btn {
            background: linear-gradient(135deg, #9c27b0, #4a148c);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .track-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(156, 39, 176, 0.4);
        }

        @media (max-width: 768px) {
            .playlist-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }

            .playlist-detail {
                padding: 20px;
            }

            .playlist-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .track-item {
                flex-wrap: wrap;
            }
        }

        /* ── Site nav ── */
        .rs-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(10,10,10,0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            z-index: 1000;
            padding: 16px 0;
        }
        .rs-nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rs-logo {
            font-size: 22px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            text-transform: lowercase;
        }
        .rs-nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }
        .rs-nav-links a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            text-transform: lowercase;
            transition: color 0.2s;
        }
        .rs-nav-links a:hover { color: #9c27b0; }
        .rs-nav-links a.active-page { color: white; }
        .rs-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: rgba(255,255,255,0.8);
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
            line-height: 1;
        }
        @media (max-width: 768px) {
            .rs-nav-links { display: none; }
            .rs-menu-toggle { display: block; }
        }
        .mobile-panel-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 1998;
            display: none;
        }
        .mobile-panel-overlay.active { display: block; }
        .mobile-panel {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; height: 100%;
            background: #111111;
            z-index: 1999;
            transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            flex-direction: column;
            padding: 24px 28px;
            overflow-y: auto;
        }
        .mobile-panel.open { right: 0; }
        .mobile-panel-close {
            align-self: flex-end;
            background: none;
            border: none;
            color: rgba(255,255,255,0.55);
            font-size: 28px;
            cursor: pointer;
            margin-bottom: 32px;
            line-height: 1;
        }
        .mobile-panel-nav a {
            display: block;
            color: white;
            text-decoration: none;
            font-size: 28px;
            font-weight: 700;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .mobile-panel-nav a:hover { color: #9c27b0; }
        .mobile-panel-nav a.active-page { color: #9c27b0; }
        .mobile-panel-cta {
            display: block;
            background: #9c27b0;
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            text-decoration: none;
            margin-top: 32px;
        }
        .mobile-panel-auth {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }
        .mobile-auth-login {
            display: block;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            text-align: center;
            text-decoration: none;
            background: rgba(255,255,255,0.07);
            color: white;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .mobile-auth-signup {
            display: block;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            text-align: center;
            text-decoration: none;
            background: #9c27b0;
            color: white;
        }
        .mobile-panel-footer {
            margin-top: auto;
            padding-top: 40px;
        }
    </style>
</head>

        <button class="mobile-panel-close" onclick="closeMobilePanel()">✕</button>
        <nav class="mobile-panel-nav">
            <a href="browse.html">Browse</a>

    <div class="container">
        <a href="browse.html" class="back-link">← Back to Music Library</a>
        
        <header>
            <h1>Playlists</h1>
            <p class="subtitle">Your custom playlists and curated collections</p>
        </header>

        <!-- My Playlists Section -->
        <div id="myPlaylistsSection" style="margin-bottom: 60px; display: none;">
            <h2 style="font-size: 1.8em; margin-bottom: 20px; color: #9c27b0;">📝 My Playlists</h2>
            <div class="playlist-grid" id="userPlaylistGrid"></div>
        </div>

        <!-- Curated Playlists Section -->
        <h2 style="font-size: 1.8em; margin-bottom: 20px;">Curated Playlists</h2>
        <!-- Playlist Grid -->
        <div class="playlist-grid" id="playlistGrid"></div>

        <!-- Playlist Details (populated dynamically) -->
        <div id="playlistDetails"></div>
    </div>

    <!-- Audio Player -->
    <div class="audio-player" id="audioPlayer">
        <div class="player-content">
            <div class="player-track-info">
                <div class="player-artwork">
                    <img src="https://pub-fd4a6646ef594336bc5ad646a65a2625.r2.dev/images/primum-electronic-cover.jpg" alt="Track" id="playerArtwork">
                </div>
                <div class="player-details">
                    <h3 id="playerTitle">Track Title</h3>
                    <p id="playerMeta">Artist</p>
                </div>
            </div>
            <div class="player-controls">
                <button class="player-btn player-btn-small" onclick="previousTrack()">⏮</button>
                <button class="player-btn" id="playPauseBtn" onclick="togglePlayPause()">▶</button>
                <button class="player-btn player-btn-small" onclick="nextTrack()">⏭</button>
            </div>
            <div class="player-progress">
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar" onclick="seek(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time" id="duration">0:00</span>
            </div>
        </div>
    </div>
    
    <audio id="audioElement"></audio>

    <script>
        // Initialize Supabase
        const SUPABASE_URL = 'https://pfqvrxfazumlydjepwib.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_1oBqgAQj0xzb5-eosyfcBg_9dKxNZfa';
        let supabaseClient = null;

        function initSupabase() {
            if (typeof window.supabase !== 'undefined') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                loadData();
            } else {
                setTimeout(initSupabase, 100);
            }
        }

        async function loadData() {
            try {
                const [tracksRes, playlistsRes] = await Promise.all([
                    supabaseClient.from('tracks').select('id, title, artist, genre, bpm, duration, stream_url, artwork_url').eq('is_active', true),
                    supabaseClient.from('curated_playlists').select('*').eq('is_active', true).order('sort_order')
                ]);
                if (tracksRes.data) {
                    tracksRes.data.forEach(t => {
                        const metaParts = [t.genre, t.bpm ? t.bpm + ' BPM' : null, t.duration].filter(Boolean);
                        trackDatabase[t.id] = {
                            title: t.artist + ' \u2014 \u201c' + t.title + '\u201d',
                            genre: t.genre || '',
                            bpm: t.bpm || '',
                            duration: t.duration || '',
                            meta: metaParts.join(' \u00b7 '),
                            artwork: t.artwork_url || '',
                            url: t.stream_url || ''
                        };
                    });
                }
                if (playlistsRes.data) {
                    curatedPlaylists = playlistsRes.data;
                }
                renderPlaylistGrid();
                loadUserPlaylists();
            } catch (err) {
                console.error('Error loading data:', err);
            }
        }

        function renderPlaylistGrid() {
            const grid = document.getElementById('playlistGrid');
            if (!curatedPlaylists.length) {
                grid.innerHTML = '<p style="color:rgba(255,255,255,0.4);padding:40px 0">No curated playlists available.</p>';
                return;
            }
            grid.innerHTML = curatedPlaylists.map(p => {
                const count = (p.track_ids || []).length;
                const emojiOrDefault = p.emoji || '\uD83C\uDFB5';
                const coverHtml = p.cover_url
                    ? '<img src="' + p.cover_url + '" alt="' + p.name.replace(/"/g, '&quot;') + '" class="playlist-image" onerror="this.style.display=\'none\'">'
                    : '<div style="width:100%;height:100%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:3em">' + emojiOrDefault + '</div>';
                return '<div class="playlist-card" onclick="showPlaylist(\'' + p.slug + '\')">'
                    + coverHtml
                    + '<div class="play-overlay">\u25B6</div>'
                    + '<div class="playlist-overlay">'
                    + '<h3 class="playlist-title">' + escapeHtml(p.name) + '</h3>'
                    + '<p class="playlist-count">' + count + ' track' + (count !== 1 ? 's' : '') + '</p>'
                    + '</div></div>';
            }).join('');
        }

        // Load user playlists
        async function loadUserPlaylists() {
            if (!supabaseClient) return;
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) {
                    document.getElementById('myPlaylistsSection').style.display = 'none';
                    return;
                }
                const { data, error } = await supabaseClient
                    .from('user_playlists')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false });
                if (error) { console.error('Error loading user playlists:', error); return; }
                const userPlaylists = data || [];
                if (userPlaylists.length === 0) {
                    document.getElementById('myPlaylistsSection').style.display = 'none';
                    return;
                }
                document.getElementById('myPlaylistsSection').style.display = 'block';
                const grid = document.getElementById('userPlaylistGrid');
                let html = '';
                userPlaylists.forEach(playlist => {
                    const trackCount = (playlist.track_ids || []).length;
                    html += `
                        <div class="playlist-card" onclick="showUserPlaylist('${playlist.id}', '${escapeHtml(playlist.name)}', ${JSON.stringify(playlist.track_ids || [])})">
                            <div style="width: 100%; height: 100%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 3em;">
                                📝
                            </div>
                            <div class="play-overlay">▶</div>
                            <div class="playlist-overlay">
                                <h3 class="playlist-title">${escapeHtml(playlist.name)}</h3>
                                <p class="playlist-count">${trackCount} track${trackCount !== 1 ? 's' : ''}</p>
                            </div>
                        </div>
                    `;
                });
                grid.innerHTML = html;
            } catch (err) {
                console.error('Error loading user playlists:', err);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Track database (populated from Supabase on load)
        const trackDatabase = {};
        let curatedPlaylists = [];

        function showUserPlaylist(playlistId, playlistName, trackIds) {
            document.getElementById('playlistGrid').style.display = 'none';
            document.getElementById('myPlaylistsSection').style.display = 'none';
            const detailsContainer = document.getElementById('playlistDetails');
            let tracksHTML = '';
            trackIds.forEach((trackId, index) => {
                const track = trackDatabase[trackId];
                if (track) {
                    tracksHTML += `
                        <div class="track-item">
                            <div class="track-number">${index + 1}</div>
                            <div class="track-artwork">
                                <img src="${escapeHtml(track.artwork)}" alt="${escapeHtml(track.title)}">
                            </div>
                            <div class="track-info">
                                <div class="track-title">${escapeHtml(track.title)}</div>
                                <div class="track-meta">${escapeHtml(track.meta)}</div>
                            </div>
                            <div class="track-actions">
                                <button class="track-btn" onclick="playTrack(${trackId}); return false;">▶ Play</button>
                            </div>
                        </div>
                    `;
                }
            });
            detailsContainer.innerHTML = `
                <div class="playlist-detail active" id="userPlaylist-${playlistId}">
                    <div class="playlist-header">
                        <div class="playlist-info">
                            <h2>📝 ${escapeHtml(playlistName)}</h2>
                            <p class="playlist-description">Your custom playlist</p>
                        </div>
                        <div class="playlist-header-actions">
                            <button class="play-playlist-btn" onclick="playUserPlaylist(${JSON.stringify(trackIds)})">▶ Play All</button>
                            <button class="close-playlist" onclick="closePlaylist()">Close</button>
                        </div>
                    </div>
                    <div class="track-list">
                        ${tracksHTML || '<p style="color: #888; padding: 20px;">No tracks in this playlist yet</p>'}
                    </div>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function playUserPlaylist(trackIds) {
            if (trackIds && trackIds.length > 0) {
                currentPlaylist = trackIds;
                currentTrackIndex = 0;
                playTrack(currentPlaylist[0]);
            }
        }

        function showPlaylist(slug) {
            const playlist = curatedPlaylists.find(p => p.slug === slug);
            if (!playlist) return;
            document.getElementById('playlistGrid').style.display = 'none';
            document.getElementById('myPlaylistsSection').style.display = 'none';
            const trackIds = playlist.track_ids || [];
            const tracksHTML = trackIds.map((trackId, index) => {
                const track = trackDatabase[trackId];
                if (!track) return '';
                return `
                    <div class="track-item">
                        <div class="track-number">${index + 1}</div>
                        <div class="track-artwork">
                            <img src="${escapeHtml(track.artwork)}" alt="${escapeHtml(track.title)}">
                        </div>
                        <div class="track-info">
                            <div class="track-title">${escapeHtml(track.title)}</div>
                            <div class="track-meta">${escapeHtml(track.meta)}</div>
                        </div>
                        <div class="track-actions">
                            <button class="track-btn" onclick="playTrack(${trackId}); return false;">▶ Play</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('playlistDetails').innerHTML = `
                <div class="playlist-detail active">
                    <div class="playlist-header">
                        <div class="playlist-info">
                            <h2>${escapeHtml(playlist.name)}</h2>
                            <p class="playlist-description">${escapeHtml(playlist.description || '')}</p>
                        </div>
                        <div class="playlist-header-actions">
                            <button class="play-playlist-btn" onclick="playCuratedPlaylist('${slug}')">▶ Play All</button>
                            <button class="close-playlist" onclick="closePlaylist()">Close</button>
                        </div>
                    </div>
                    <div class="track-list">${tracksHTML || '<p style="color:#888;padding:20px">No tracks in this playlist.</p>'}</div>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closePlaylist() {
            document.getElementById('playlistDetails').innerHTML = '';
            document.getElementById('playlistGrid').style.display = 'grid';
            loadUserPlaylists();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Audio Player Functionality
        const audioElement = document.getElementById('audioElement');
        const audioPlayer = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');

        let currentPlaylist = [];
        let currentTrackIndex = 0;

        function playTrack(trackId) {
            const track = trackDatabase[trackId];
            if (!track) return;
            audioElement.src = track.url;
            document.getElementById('playerTitle').textContent = track.title;
            document.getElementById('playerMeta').textContent = track.meta;
            audioPlayer.classList.add('active');
            audioElement.play();
            playPauseBtn.textContent = '\u23F8';
        }

        function togglePlayPause() {
            if (audioElement.paused) {
                audioElement.play();
                playPauseBtn.textContent = '\u23F8';
            } else {
                audioElement.pause();
                playPauseBtn.textContent = '\u25B6';
            }
        }

        function previousTrack() {
            if (currentPlaylist.length === 0) return;
            currentTrackIndex = (currentTrackIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
            playTrack(currentPlaylist[currentTrackIndex]);
        }

        function nextTrack() {
            if (currentPlaylist.length === 0) return;
            currentTrackIndex = (currentTrackIndex + 1) % currentPlaylist.length;
            playTrack(currentPlaylist[currentTrackIndex]);
        }

        function seek(event) {
            const bar = event.currentTarget;
            const clickX = event.offsetX;
            const width = bar.offsetWidth;
            const percentage = clickX / width;
            audioElement.currentTime = audioElement.duration * percentage;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + secs.toString().padStart(2, '0');
        }

        audioElement.addEventListener('timeupdate', () => {
            if (audioElement.duration) {
                const percentage = (audioElement.currentTime / audioElement.duration) * 100;
                progressFill.style.width = percentage + '%';
                currentTimeEl.textContent = formatTime(audioElement.currentTime);
            }
        });

        audioElement.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audioElement.duration);
        });

        audioElement.addEventListener('ended', () => {
            nextTrack();
        });

        function playCuratedPlaylist(slug) {
            const playlist = curatedPlaylists.find(p => p.slug === slug);
            if (!playlist || !playlist.track_ids || !playlist.track_ids.length) return;
            currentPlaylist = playlist.track_ids;
            currentTrackIndex = 0;
            playTrack(currentPlaylist[0]);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initSupabase();
        });

        function toggleMobileMenu() {
            const panel = document.getElementById('mobilePanel');
            const overlay = document.getElementById('mobilePanelOverlay');
            const toggle = document.getElementById('mobileMenuToggle');
            if (panel.classList.contains('open')) {
                closeMobilePanel();
            } else {
                panel.classList.add('open');
                overlay.classList.add('active');
                if (toggle) toggle.textContent = '\u2715';
                document.body.style.overflow = 'hidden';
            }
        }
        function closeMobilePanel() {
            const panel = document.getElementById('mobilePanel');
            const overlay = document.getElementById('mobilePanelOverlay');
            const toggle = document.getElementById('mobileMenuToggle');
            if (panel) panel.classList.remove('open');
            if (overlay) overlay.classList.remove('active');
            if (toggle) toggle.textContent = '\u2630';
            document.body.style.overflow = '';
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMobilePanel(); });

    </script>
</body>
</html>
