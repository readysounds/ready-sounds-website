<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="og" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FFDD44"/>
      <stop offset="100%" stop-color="#FF4400"/>
    </linearGradient>
    <linearGradient id="pg" x1="0%" y1="20%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#FF44EE"/>
      <stop offset="100%" stop-color="#6600BB"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="100" height="100" fill="#181818"/>

  <!-- Orange upper arcs: lower-left to lower-right, large arc over the top -->
