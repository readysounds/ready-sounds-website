  <path d="M 23 63 A 31 31 0 1 1 81 63" fill="none" stroke="url(#og)" stroke-width="7"  stroke-linecap="round"/>
  <path d="M 31 60 A 22 22 0 1 1 73 60" fill="none" stroke="url(#og)" stroke-width="6"  stroke-linecap="round"/>
  <path d="M 39 57 A 14 14 0 1 1 65 57" fill="none" stroke="url(#og)" stroke-width="5"  stroke-linecap="round"/>

  <!-- Purple lower arcs: upper-right to upper-left, large arc under the bottom -->
  <path d="M 90 38 A 40 40 0 1 0 14 38" fill="none" stroke="url(#pg)" stroke-width="8"  stroke-linecap="round"/>
  <path d="M 81 41 A 31 31 0 1 0 23 41" fill="none" stroke="url(#pg)" stroke-width="7"  stroke-linecap="round"/>
  <path d="M 73 45 A 22 22 0 1 0 31 45" fill="none" stroke="url(#pg)" stroke-width="6"  stroke-linecap="round"/>
  <path d="M 65 47 A 14 14 0 1 0 39 47" fill="none" stroke="url(#pg)" stroke-width="5"  stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="52" cy="52" r="4" fill="#FF8800"/>
</svg>
